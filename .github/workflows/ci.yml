name: DeployGuard CI/CD
on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Run DeployGuard Pre-checks
        uses: deployguard/action@v1
        with:
          project-id: ${PROJECT_ID}
          api-key: ${{ secrets.DEPLOYGUARD_API_KEY }}
      - name: Deploy
        run: ./deploy.sh --env production
