name: DeployGuard CI/CD
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: ${{ secrets.DB_NAME }}
          POSTGRES_USER: ${{ secrets.DB_USER }}
          POSTGRES_PASSWORD: ${{ secrets.DB_PASSWORD }}
        ports:
          - 5432:5432
        

    steps:
      - uses: actions/checkout@v3

      - name: Set up JDK 11
        uses: actions/setup-java@v3
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: maven

      - name: Build & Test with Maven
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/${{ secrets.DB_NAME }}
          SPRING_DATASOURCE_USERNAME: ${{ secrets.DB_USER }}
          SPRING_DATASOURCE_PASSWORD: ${{ secrets.DB_PASSWORD }}
        run: mvn clean package -Dmaven.test.skip=true 

      # 🔐 Login en Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 🐳 Build & Push imagen
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/mgtapp:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/mgtapp:${{ github.sha }}

      - name: Call Meraki API
        run: |
          curl -L \
          -H "X-Cisco-Meraki-API-Key: $MERAKI_API_KEY" \
          -H "Content-Type: application/json" \
          -X GET \
          "https://api.meraki.com/api/v1/organizations/1749173/networks"
        env:
          MERAKI_API_KEY: ${{ secrets.MERAKI_API_KEY }}     
