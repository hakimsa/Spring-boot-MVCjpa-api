name: DeployGuard CI/CD
on:
  workflow_dispatch:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up JDK
        uses: actions/setup-java@v3
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: maven

      - name: Build & Test
        run: mvn clean package -Dmaven.test.skip=true

  docker-build:
    runs-on: ubuntu-latest
    needs: build-test
    steps:
      - uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/mgtapp:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/mgtapp:${{ github.sha }}

  argo-sync:
    runs-on: self-hosted
    needs: docker-build
    steps:
      - uses: actions/checkout@v3

      - name: Trigger ArgoCD Deploy
        run: |
          argocd app sync mgtapp --auth-token ${{ secrets.ARGOCD_TOKEN }}

  meraki-check:
    runs-on: ubuntu-latest
    needs: argo-sync
    steps:
      - name: Validate Meraki Network Exists
        run: |
          COUNT=$(curl -s -L \
            -H "X-Cisco-Meraki-API-Key: $MERAKI_API_KEY" \
            -H "Content-Type: application/json" \
            -X GET \
            "https://api.meraki.com/api/v1/organizations/1749173/networks" \
            | jq '[.[] | select(.name=="lab-test")] | length')

          if [ "$COUNT" -eq 0 ]; then
            echo "Network lab-test not found!"
            exit 1
          fi
          echo "Network lab-test exists!"
        env:
          MERAKI_API_KEY: ${{ secrets.MERAKI_API_KEY }}

  smoke-test:
    runs-on: ubuntu-latest
    needs: meraki-check
    steps:
      - name: Run Smoke Tests
        run: |
          ./scripts/smoke_test.sh