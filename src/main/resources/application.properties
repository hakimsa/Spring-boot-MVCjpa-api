# Puerto de la aplicación
server.port=8087

# Usuario de Spring Security
spring.security.user.name=webprod
spring.security.user.password=HSrd82AB**

# Exponer endpoints de actuator
management.endpoints.web.exposure.include=health,info,prometheus

# Habilitar endpoint prometheus
management.endpoint.prometheus.enabled=true
management.metrics.export.prometheus.enabled=true

# Health checks (útil para Kubernetes)
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=always

# Información de la aplicación
info.app.name=Spring Boot Employee API
info.app.version=1.0.0

# PostgreSQL
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}

# Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Mostrar SQL (debug)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true